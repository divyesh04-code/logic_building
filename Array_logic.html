        // 1️⃣6️⃣ Remove Duplicates from Array
        let name = ["Pavan","Divyesh","Nitin","Pavan","Jayraj"];
        let unique = [];
        for(let i=0; i<name.length; i++){
            if(!unique.includes(name[i])){
                unique.push(name[i]);
            }
        }

        // 1️⃣8️⃣ Find Second Largest Number
        let marks = [40, 75, 55, 48, 85];
        let Largest = marks[0];
        let secondLargest = marks[0];
        for(let i=0; i<marks.length; i++){
            if(marks[i] > marks[i]+1){
                secondLargest = Largest;
                Largest = marks[i];
            }
